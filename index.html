<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>I Love You 💗</title>

  <style>
    :root {
      --bg: #000000;
      --text-main: #f7e9f2;
      --text-sub: #efddea;
      --text-pre: rgba(255, 255, 255, 0.6);

      --glow-pink: rgba(255, 145, 191, 0.42);
      --glow-soft: rgba(255, 255, 255, 0.14);

      --heart: rgba(255, 174, 205, 0.9);

      --petal-a: rgba(255, 193, 212, 0.72);
      --petal-b: rgba(255, 220, 232, 0.72);
      --petal-c: rgba(210, 236, 255, 0.72);
      --petal-d: rgba(236, 223, 255, 0.72);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        "Segoe UI",
        system-ui,
        sans-serif;
      position: relative;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 45%),
        linear-gradient(180deg, #000000, #050505);
    }

    .fx-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .content,
    .preloader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }

    .content {
      z-index: 2;
      opacity: 0;
    }

    .preloader {
      z-index: 3;
      color: var(--text-pre);
    }

    .preloader.fade-in {
      animation: fadeIn 1.2s ease forwards;
    }

    .preloader.fade-out {
      animation: fadeOut 1.2s ease forwards;
    }

    .pre-text {
      font-size: clamp(1rem, 3vw, 1.6rem);
      line-height: 1.3;
      font-style: italic;
      opacity: 0;
      animation: fadeIn 1.6s ease forwards;
    }

    .pre-sub {
      margin-top: 0.6em;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      opacity: 0.7;
    }

    .text-wrap {
      opacity: 0;
      transform: translateY(10px);
    }

    .text-wrap.show {
      animation: intro 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .headline {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 6.6rem);
      font-style: italic;
      font-weight: 700;
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        0 0 12px var(--glow-pink);
    }

    .subline {
      margin-top: 0.4em;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      font-style: italic;
      opacity: 0.9;
    }

    @keyframes fadeIn {
      from { opacity: 0; filter: blur(6px); }
      to { opacity: 1; filter: blur(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; filter: blur(0); }
      to { opacity: 0; filter: blur(6px); }
    }

    @keyframes intro {
      0% {
        opacity: 0;
        transform: translateY(16px);
        filter: blur(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .heart {
      width: 16px;
      height: 16px;
      color: var(--heart);
      opacity: 0;
    }

    .flower {
      width: 44px;
      height: 44px;
      opacity: 0;
    }

    @keyframes heart-fall {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      10% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translateY(var(--dy)) scale(var(--scale)) rotate(var(--rot));
      }
    }

    @keyframes flower-fall {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(var(--dy)) scale(1.4) rotate(var(--rot));
      }
    }

  </style>
</head>

<body>
  <main class="scene">
    <div class="fx-layer" id="fxLayer"></div>

    <!-- Preloader -->
    <div class="preloader fade-in" id="preloader">
      <div>
        <div class="pre-text">
          попробуй потыкать на экран и повести пальчиком
        </div>
        <div class="pre-sub">
          (рекомендую на ноутбуке смотреть)
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="content" id="content">
      <div class="text-wrap" id="textWrap">
        <h1 class="headline">I Love You 💗</h1>
        <p class="subline">sorry, my baby ;(</p>
      </div>
    </div>
  </main>

  <script>
    const fxLayer = document.getElementById("fxLayer");
    const preloader = document.getElementById("preloader");
    const content = document.getElementById("content");
    const textWrap = document.getElementById("textWrap");

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createHeart(x, y) {
      const el = document.createElement("div");
      el.className = "particle heart";

      el.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 21s-6-4.35-9-8.5C-1 6 4 1 8 4c1.5 1 2.5 2.5 4 4 1.5-1.5 2.5-3 4-4 4-3 9 2 5 8.5C18 16.65 12 21 12 21z"
          stroke="currentColor" stroke-width="1.5"/>
        </svg>
      `;

      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.setProperty("--dy", rand(80, 160) + "px");
      el.style.setProperty("--scale", rand(0.8, 1.2));
      el.style.setProperty("--rot", rand(-180, 180) + "deg");
      el.style.animation = "heart-fall 2s ease forwards";

      fxLayer.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function createFlower(x, y) {
      const el = document.createElement("div");
      el.className = "particle flower";

      el.innerHTML = `
        <svg viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="6" fill="rgba(255,255,255,0.8)" />
          <ellipse cx="24" cy="12" rx="6" ry="10" fill="var(--petal-a)" />
          <ellipse cx="36" cy="24" rx="10" ry="6" fill="var(--petal-b)" />
          <ellipse cx="24" cy="36" rx="6" ry="10" fill="var(--petal-c)" />
          <ellipse cx="12" cy="24" rx="10" ry="6" fill="var(--petal-d)" />
        </svg>
      `;

      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.setProperty("--dy", rand(120, 220) + "px");
      el.style.setProperty("--rot", rand(-120, 120) + "deg");
      el.style.animation = "flower-fall 2.6s ease forwards";

      fxLayer.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }

    window.addEventListener("mousemove", e => {
      createHeart(e.clientX, e.clientY);
    });

    window.addEventListener("click", e => {
      createFlower(e.clientX, e.clientY);
    });

    // Preloader logic
    setTimeout(() => {
      preloader.classList.add("fade-out");

      setTimeout(() => {
        preloader.style.display = "none";
        content.style.opacity = "1";
        textWrap.classList.add("show");
      }, 1200);

    }, 5000);
  </script>
</body>
</html>
